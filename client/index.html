<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Space Domain Awareness</title>
    <link
      rel="stylesheet"
      href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main id="app">
      <div id="cesiumContainer"></div>
      <aside
        id="anomalyAlert"
        style="display: none; position: fixed; top: 18px; right: 18px; z-index: 20; background: #1A1A2E; border: 2px solid #FFC300; padding: 16px; font-family: Arial, Helvetica, sans-serif; line-height: 1.5;"
        aria-live="assertive"
      >
        <div style="font-weight: bold; color: #FFC300; font-size: 14px;">⚠ ANOMALY DETECTED</div>
        <div style="color: #E8F4FD;">RSO: <span id="anomalyRso">UNKNOWN</span></div>
        <div style="color: #E8F4FD;">Deviation: +12.7% predicted track divergence</div>
        <div style="color: #FFC300;">Status: MONITORING</div>
        <div style="color: #AAAAAA; font-size: 11px;">Time: <span id="anomalyTime">PENDING</span></div>
      </aside>
      <section id="statusBar" aria-live="polite">
        <span>Data Source: Space-Track.org</span>
        <span>Last Updated: <time id="lastUpdated">INITIALIZING</time></span>
        <span>Objects Tracked: <strong id="objectCount">0</strong></span>
        <span>System Status: <strong id="systemStatus">NOMINAL</strong></span>
      </section>
    </main>

    <script>
      window.CESIUM_BASE_URL =
        "https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/";
    </script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/satellite.js@5.0.0/dist/satellite.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
